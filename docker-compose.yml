
services:
  postgres:
    image: postgres:16-alpine
    container_name: careerlens_db
    environment:
      POSTGRES_USER: careerlens
      POSTGRES_PASSWORD: careerlens_secret
      POSTGRES_DB: careerlens
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/migrations.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U careerlens']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
